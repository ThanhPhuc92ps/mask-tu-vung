<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mask Từ Vựng - Học Tiếng Anh Chủ Động</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Mask Từ Vựng</h1>
        <div id="tagDisplay" class="tag-list"></div>
    </header>

    <article id="content">
        <p style="text-align:center; color: #999;">Đang tải bài học mới nhất...</p>
    </article>
</div>

<div class="controls">
    <button class="btn-reveal" onclick="revealNext()">Mở từ tiếp theo (Space)</button>
    <button class="btn-reset" onclick="location.reload()" style="background-color: #95a5a6; padding: 10px 15px; font-size: 12px;">Làm mới</button>
</div>

<script type="module">
    import { firebaseConfig } from './assets/js/firebase-config.js';
    import { parseContent, setupRevealLogic } from './assets/js/utils.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Khởi tạo Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Khởi tạo logic phím Space và Reveal
    const { revealNext } = setupRevealLogic();
    window.revealNext = revealNext; 

    // Lắng nghe dữ liệu
    const q = query(collection(db, "articles"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        if (!snapshot.empty) {
            const data = snapshot.docs[0].data();
            
            // 1. Hiển thị Tags bài viết
            const tagDiv = document.getElementById('tagDisplay');
            if(data.tags) {
                tagDiv.innerHTML = data.tags.map(t => `<span class="tag-item">#${t}</span>`).join('');
            }

            // 2. Hiển thị Nội dung đã được "Mask"
            document.getElementById('content').innerHTML = parseContent(data.content);
        } else {
            document.getElementById('content').innerHTML = "<p style='text-align:center'>Chưa có bài viết nào.</p>";
        }
    });
</script>

</body>
</html>
