<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mask Từ Vựng</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Mask Từ Vựng</h1>
        <div id="content">Đang tải...</div>
    </div>

    <script type="module">
        import { firebaseConfig } from './assets/js/firebase-config.js';
        import { parseContent, setupRevealLogic } from './assets/js/utils.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const { revealNext } = setupRevealLogic();
        window.revealNext = revealNext; // Để nút bấm gọi được

        const q = query(collection(db, "articles"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            if (!snapshot.empty) {
                const data = snapshot.docs[0].data();
                document.getElementById('content').innerHTML = parseContent(data.content);
            }
        });
    </script>
</body>
</html>
